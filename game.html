    <script>
        
        class RoomData {
            static peer;
            static hostConnection; //lo usan clientes para hablar con el host
            static clientsConnections = []; //lo usa el host para hablar con clientes
            static isHost = false;
            static roomId = null;
            static myName = '';
            static players = [];

            static get myPlayerIndex() {
                return this.players.findIndex(p => p.id === this.peer?.id);
            }
           
            static getPlayerName(id){
                return this.players[id].name;
            }
            static getPlayerPeerId(id){
                return this.players[id].id;
            }
            static getPlayerId(peerId) {
                return this.players.findIndex(p => p.id === peerId);
            }
            static AddClientConn(conn) {
                if (!this.isHost) throw new Error('Only Host');
                
                // Agregar la conexión al array
                this.clientsConnections.push(conn);
                
                // Configurar evento para removerla automáticamente cuando se cierre
                conn.on('close', () => {
                    this.RemoveClientConn(conn);

                    if(UI._currentWindow === UI.WINDOWS.GAME_MENU){
                        const errorLog = "Un jugador se salió, partida cancelada";
                        UI.showError(errorLog);
                        this.SendMessageToClients({
                            type : 'error',
                            msg: errorLog
                        });

                        
                        cancelRoom();
                    }
                });
                
                conn.on('data', (data) => {
                    this.HandleData(data, conn.peer);
                });

                console.log(`Cliente conectado. Total: ${this.clientsConnections.length}`);
            }

            static RemoveClientConn(conn) {
                if (!this.isHost) throw new Error('Only Host');
                
                const index = this.clientsConnections.indexOf(conn);
                if (index > -1) {
                    this.clientsConnections.splice(index, 1);
                    console.log(`Cliente removido. Quedan: ${this.clientsConnections.length}`);
                }

                //Quitar de la lista players
                this.players = this.players.filter(j => j.id !== conn.peer); //esta linea da error

                //Avisar a todos del cambio
                this.SendMessageToClients({
                        type: 'players_list',
                        players: RoomData.players
                    });
                
                UI.setPlayerList(this.players);
            }

            static SetHostConn(conn) {
                if (this.isHost) throw new Error('Only Clients');
                
                this.hostConnection = conn;

                this.hostConnection.on('data', (data) => {
                    this.HandleData(data);
                });
            }

            static SendMessageToHost(msg){
                if(this.isHost) throw new Error('Only Clients');

                if(this.hostConnection){
                    this.hostConnection.send(msg);
                }
                else{
                    throw new Error('First Init Host');
                }
            }

            static SendMessageToClients(msg) {
                if (!this.isHost) throw new Error('Only Host');
                
                // Enviar a todos los clientes
                this.clientsConnections.forEach(conn => {
                    if (conn && conn.open) {
                        conn.send(msg);
                    }
                });
            }
            static SendMessageToClient(clientId, msg) {
                if (!this.isHost) throw new Error('Only Host');
                
                // Buscar la conexión por el peer.id del cliente
                const connection = this.clientsConnections.find(conn => conn.peer === clientId);
                
                if (connection && connection.open) {
                    connection.send(msg);
                }
            }

            static HandleData(data, clientID) {
                console.log('Datos recibidos:', data);
                
                switch(data.type) {
                    case 'new_player':
                        //Host recibe info de un cliente
                        //Si no cabe, decirselo
                        if(this.players.length >= 6){                         
                            this.SendMessageToClient(data.id, 
                            {
                                type: 'room_full'
                            });
                            return;
                        }
                        //Si cabe:
                        // Host recibe nuevo jugador
                        const newPlayer = {
                            id: data.id,
                            name: data.name,
                            isHost: false
                        };
                        this.players.push(newPlayer);
                        UI.setPlayerList(this.players);
                        
                        // Notificar a todos  la lista actualizada

                        this.SendMessageToClients({
                            type: 'players_list',
                            players: RoomData.players
                        });
                        break;
                        
                    case 'players_list':
                        // Jugador recibe lista actualizada del host
                        this.players = data.players;
                        UI.setPlayerList(this.players);
                        break;
                        
                    case 'room_full':
                        UI.setCurrentWindow(UI.WINDOWS.MAIN_MENU);
                        UI.showError('Sala llena');
                        break;
                    case 'start_game':
                        GameManager.onStartGame(data.initialPlayer, data.boardSize, data.randomSeed, data.density);
                        break;
                    case 'error':
                        UI.showError(data.msg);
                        break;
                    case 'new_turn':
                        
                        if(!data.waitToEndSimulation){
                            GameManager.waitingForNewTurnInstructions = true;
                        }
                        //Asignar
                        GameManager.assignNewTurnClient(() => GameManager.newTurnClient(data.id));
                        
                        break;
                    case 'client_Click':
                        if(clientID === this.getPlayerPeerId(GameManager.currentPlayer)){
                            //El jugador dio click
                            GameManager.onCellClick(data.row, data.col, GameManager.currentPlayer);
                        }
                        break;
                    case 'spawn_initial_piece':
                        GameManager.SpawnFirstTurnPiece(data.row, data.col, data.ownerId);
                        break;
                    case 'spawn_piece':
                        GameManager.SpawnInitialPiece(data.row, data.col, data.ownerId, data.spawnDirection);
                        break;
                    case 'update_and_check':
                        GameManager.UpdateAndCheckCell(data.row, data.col);
                        break;
                    case 'minus_four':
                        GameManager.MinusFour(data.row, data.col);
                        break;
                    default:
                }
            }
        }

        class Cell{
            #value; //[0,6] valor de la casilla, 0 si no tiene dueño
            #owner; //[-2, numberPlayers) dueño de la casilla, -1 si no tiene dueño, -2 si es muro
            #currentPiece; //referencia a la ficha si tiene

            #nextPieces = []; //pieza q se desplaza hacia esta celda

            constructor(isWall = false, value = 0, owner = -1, currentPiece = null) {
                this.#value = value;

                if(isWall){
                    this.#owner = -2;
                }else{
                    this.#owner = owner;
                }
                this.#currentPiece = currentPiece;
            }

            set currentPiece(piece){
                if(this.isWall) return;

                if(RoomData.isHost){
                    GameManager.addPointToPlayer(this.#owner);
                }
                this.#currentPiece = piece;
            }
            addNextPiece(piece) {
                this.#nextPieces.push(piece);
            }
            cleanNextPieces(){
                const numberOfPieces = this.#nextPieces.length;
                
                if (numberOfPieces > 0) {
                    // Si no hay currentPiece, la primera pieza se conserva
                    if (this.#currentPiece === null && this.isWall === false) {
                        this.currentPiece = this.#nextPieces[0];
                        
                        for (let i = 1; i < numberOfPieces; i++) {
                            this.#nextPieces[i].remove(); //remove borra del DOM, no del array
                        }
                    } else {
                        // Si ya hay currentPiece, eliminar todas las nextPieces
                        //si caen en un muro exterminarlas a todas
                        this.#nextPieces.forEach(piece =>{
                            piece.remove();
                        });
                    }
                }
                this.#nextPieces = [];
                return numberOfPieces;
            }
            get value(){
                return this.#value;
            }
            set value(_value){
                if(this.isWall) return;
                this.#value = _value;
            }
            set owner(_owner){
                if(this.isWall) return;
                if(RoomData.isHost){
                    
                    //Si cambia de dueño o se le asigna dueño
                    if(_owner != this.owner){
                        if(this.owner !== -1){
                            GameManager.removePointFromPlayer(this.owner);
                        }
                        GameManager.addPointToPlayer(_owner);
                    }
                }
               
                this.#owner = _owner;
            }
            get owner(){
                return this.#owner;
            }
            get imTheOwner(){
                return GameManager.myId === this.#owner;
            }
            get hasOwner(){
                return this.#owner >= 0;
            }

            set isWall(value){ 
                if(value === true){
                    this.#owner = -2; 
                }
                else if(value === false){
                    this.#owner = -1;
                }
            }
            get isWall(){
                return this.#owner === -2;
            }

            isOwner(id){
                return this.#owner === id;
            }

            minusFour(){
                if(this.isWall) return;
                if(this.#value === 4){
                    this.delete();
                }
                
                if(this.#value>4){
                    this.#value -= 4;

                    this.#currentPiece.classList.remove('v1', 'v2', 'v3', 'v4', 'v5', 'v6');

                    this.#currentPiece.classList.add('v'+this.#value);
                    return false;
                }
            }

            delete(){
                this.#value = 0;
                this.owner = -1;
                this.#currentPiece.remove();
                
                this.#currentPiece = null;
            }
            updateCell(){
                //borrar las q caen encima, y sumar sus valores a la q habia
                if(this.isWall){
                    this.cleanNextPieces();
                    return;
                }
                if(this.#nextPieces){
                    const numberOfPieces = this.cleanNextPieces();
                    this.owner = GameManager.currentPlayer;
                    this.#value+= numberOfPieces;

                    //le caen encima n fichas del jugador current, lo cual cambia el dueño de la ficha de esta celda y su valor
                }
                if(this.#currentPiece === null) return;

                this.#currentPiece.classList.remove('v1', 'v2', 'v3', 'v4', 'v5', 'v6');
                this.#currentPiece.classList.remove('p0','p1','p2','p3','p4','p5');

                if(this.#value !== 0){
                    this.#currentPiece.classList.add('v'+this.#value);
                }
                if(this.#owner >= 0){
                    this.#currentPiece.classList.add('p'+this.#owner);
                }
            }
        }
        class GameManager{
            static #currentPlayer;//id [0,6), datos en roomData.players[]

            static numberOfPlayers = 0;
            static get myId(){
                return RoomData.myPlayerIndex;
            }
            
            static get currentPlayer(){
                return this.#currentPlayer;
            }
            static get randomPlayer() {
                return Math.floor(Math.random() * this.numberOfPlayers);
            }
            static set currentPlayer(value){
                const lastVal = this.#currentPlayer;
                this.#currentPlayer = value;
                UI.SetCurrentPlayer(RoomData.getPlayerName(this.currentPlayer), this.currentPlayer, lastVal, this.isMyTurn);
                UI.SetMyTurn(this.isMyTurn, this.isMyFirstTurn);
            }
            static get nextPlayer(){
                return (this.currentPlayer + 1) % this.numberOfPlayers;
            }
            static get isMyTurn(){
                return this.myId == this.currentPlayer;
            }

            static #initialTurn = true;
            static get isMyFirstTurn(){
                return this.isMyTurn && this.#initialTurn;
            }

            static #boardSize;
            static #cells;
            static #cellsAboutToExplode = [];

            static #positionsToUpdate = new Set();

            
            static pointsPerPlayer = [];
            static addPointToPlayer(playerId){
                if(this.pointsPerPlayer[playerId] === -1){
                    const p = this.pointsPerPlayer[playerId] = 1;
                }
                else{
                    const p = this.pointsPerPlayer[playerId]++;
                }
            }
            static removePointFromPlayer(playerId){
                this.pointsPerPlayer[playerId]--;
            }
            static #deathPlayers = new Set();
            
            static resetPositionsToUpdate(){ this.#positionsToUpdate = new Set(); }
            static resetDeathPlayers(){ this.#deathPlayers = new Set(); }

            static randomSeed = 0;
            static density = 0.0; // proporción de muros deseada (60% muros → 40% espacios libres)
            // static set boardSize(value){
                
            //     UI.setBoard(value);

            //     const randomGenerator = new RandomGenerator(this.randomSeed);
            //     const density = 0.6;

                
            //     //inicial #cell como array nxn
            //     this.#cells = [];
    
            //     for (let i = 0; i < value; i++) {
            //         this.#cells[i] = [];
            //         for (let j = 0; j < value; j++) {
            //             this.#cells[i][j] = new Cell();
            //         }
            //     }

            //     this.#boardSize = value;
            // }

            static set boardSize(value) {
                
                const randomGenerator = new RandomGenerator(this.randomSeed);
                const density = this.density;

                // Inicializar todo como muros
                this.#cells = [];
                for (let i = 0; i < value; i++) {
                    this.#cells[i] = [];
                    for (let j = 0; j < value; j++) {
                        this.#cells[i][j] = new Cell(true); // todos son muros
                    }
                }
                
                // Casilla central (sin muro)
                const center = Math.floor((value - 1) / 2);
                this.#cells[center][center] = new Cell(); // sin muro
                
                let noMurosCount = 1; // contador de celdas sin muro
                const totalCells = value * value;
                const targetNoMuros = Math.ceil(totalCells * (1 - density)); // mínimo de celdas libres requeridas
                
                while (noMurosCount < targetNoMuros) {
                    // Buscar todas las celdas sin muro que tengan al menos un vecino muro (4 direcciones)
                    let candidates = [];
                    let weights = [];
                    
                    for (let i = 0; i < value; i++) {
                        for (let j = 0; j < value; j++) {
                            if (this.#cells[i][j].isWall) continue; // solo celdas libres
                            
                            // Contar vecinos que son muro
                            let muroCount = 0;
                            if (i > 0 && this.#cells[i-1][j].isWall) muroCount++;
                            if (i < value-1 && this.#cells[i+1][j].isWall) muroCount++;
                            if (j > 0 && this.#cells[i][j-1].isWall) muroCount++;
                            if (j < value-1 && this.#cells[i][j+1].isWall) muroCount++;
                            
                            if (muroCount > 0) {
                                candidates.push({ i, j });
                                weights.push(Math.pow(20, muroCount)); // peso = número de vecinos muro
                            }
                        }
                    }
                    
                    // Si no hay candidatas, terminamos antes (no se puede expandir más)
                    if (candidates.length === 0) {
                        console.warn("No hay más celdas para expandir. Se alcanzaron", noMurosCount, "de", targetNoMuros);
                        break;
                    }
                    
                    // Seleccionar una candidata con probabilidad proporcional a weights
                    const idx = randomGenerator.selectIndex(weights);
                    const { i, j } = candidates[idx];
                    
                    // Lista de vecinos muro de esa celda
                    let murosVecinos = [];
                    if (i > 0 && this.#cells[i-1][j].isWall) murosVecinos.push({ i: i-1, j });
                    if (i < value-1 && this.#cells[i+1][j].isWall) murosVecinos.push({ i: i+1, j });
                    if (j > 0 && this.#cells[i][j-1].isWall) murosVecinos.push({ i, j: j-1 });
                    if (j < value-1 && this.#cells[i][j+1].isWall) murosVecinos.push({ i, j: j+1 });
                    
                    // Elegir uno aleatorio entre esos vecinos
                    const vecinoIdx = Math.floor(randomGenerator.next() * murosVecinos.length);
                    const { i: vi, j: vj } = murosVecinos[vecinoIdx];
                    
                    // Convertir ese vecino en no muro
                    this.#cells[vi][vj].isWall = false; // sin muro
                    noMurosCount++;
                }

                UI.setBoard(value, this.#cells);
                
                this.#boardSize = value;
            }
            
            static getCell(row, col) {
                return this.#cells[row][col];
            }

            static #canActThisTurn = true; //solo una accion por turno, la usa el server solo
            static newTurnHost(waitToEndSimulation){
                if(RoomData.isHost){
                    
                    let i = 0;
                    
                    if(this.isMyFirstTurn){
                        this.#initialTurn = false;
                    }

                    while(i< this.numberOfPlayers){
                        console.log("Puntos de "+i+": "+this.pointsPerPlayer[i]);
                        if(this.pointsPerPlayer[i]==0){
                            console.log("Muerto");
                            this.#deathPlayers.add(i)
                        }
                        i++;
                    }
                    if(this.#deathPlayers.size === this.numberOfPlayers-1){
                        //gano el current

                        setTimeout(() => {
                            cancelRoom();
                        }, 1500);
                    }
                    else{
                        this.currentPlayer = this.nextPlayer;
                        while(this.#deathPlayers.has(this.currentPlayer)){
                            this.currentPlayer = this.nextPlayer;
                        }
                        RoomData.SendMessageToClients({
                            type: 'new_turn',
                            id: this.currentPlayer,
                            waitToEndSimulation: waitToEndSimulation
                        });
                        this.#canActThisTurn = true;
                    }
                }
            }

            static #newTurnClient;
            static waitingForNewTurnInstructions = false;
            static NewTurnClientExec() {
                if(this.#newTurnClient){
                    this.#newTurnClient();
                    this.clearNewTurnClient();
                }
                else{
                    this.waitingForNewTurnInstructions = true;
                }
            }
            static assignNewTurnClient(lambdaFunc) {
                if (typeof lambdaFunc !== 'function') throw new Error('Se esperaba función');

                if(this.waitingForNewTurnInstructions){
                    this.waitingForNewTurnInstructions = false;
                    lambdaFunc();
                    return;
                }

                this.#newTurnClient = lambdaFunc;
                
            }
            static clearNewTurnClient() {
                this.#newTurnClient = null;
            }

            static newTurnClient(currentPlayer){
                if(this.isMyFirstTurn){
                    this.#initialTurn = false;
                }
                this.currentPlayer = currentPlayer;
            }

            static onCellClick_DoOrReq(row, col){
                if(!this.isMyTurn) return;

                if(RoomData.isHost){
                    this.onCellClick(row, col, this.myId);
                }
                else{
                    RoomData.SendMessageToHost({
                        type: 'client_Click',
                        row: row,
                        col: col
                    });
                }

            }
            
            static onCellClick(row, col, id){
                //Se llama en host cuando el jugador haga click en su turno

                //El host simula la ronda, y le envia a los jugadores info para recrear la simulacion
                //opcional: mandar al principio de cada turno todo el tablero por si no les llegó algún mensaje de la simulación del turno anterior
                if(this.#canActThisTurn === false) return;
                const firstTurn = this.pointsPerPlayer[id] === -1;

               let i = 0;
                while(i< this.numberOfPlayers){
                    i++;
                }
                
                const cell = this.getCell(row,col);

                if(cell.isWall) return;

                this.SpawnPiecePhase(row, col, firstTurn, id, cell);
            }

            static SpawnPiecePhase(row, col, firstTurn, id, cell){
                
                if(firstTurn){
                    //Primer turno de ese jugador
                    //Spawnear ficha
                    if(cell.hasOwner === false){

                        this.#canActThisTurn = false; //este no es necesario, pero por si luego meto timeOut
                        this.SpawnFirstTurnPiece(row, col, id);
                        this.newTurnHost(false);
                    }
                }
                else{
                    //Sumar 1 a la casilla, si es suya
                    if(cell.isOwner(id)){
                        
                        this.#canActThisTurn = false;
                        this.SpawnInitialPiece(row, col, id, UI.SPAWN_DIRECTIONS.DOWN);
                    }
                }
            }

            static SpawnFirstTurnPiece(row, col, pieceOwner){
                if(RoomData.isHost){
                    RoomData.SendMessageToClients({
                        type: 'spawn_initial_piece',
                        row: row,
                        col: col,
                        ownerId: pieceOwner
                    });
                }
                
                const cell = this.getCell(row,col);

                const piece = UI.SpawnPiece(row, col, UI.SPAWN_DIRECTIONS.DOWN, 3, pieceOwner);

                cell.currentPiece = piece;
                cell.owner = pieceOwner;
                cell.value = 3;
            }

            static SpawnInitialPiece(row, col, pieceOwner, spawnDirection){
                if(RoomData.isHost){
                    RoomData.SendMessageToClients({
                        type: 'spawn_piece',
                        row: row,
                        col: col,
                        spawnDirection: spawnDirection,
                        ownerId: pieceOwner
                    });
                }

                const cell = this.getCell(row,col);
                const piece = UI.SpawnPiece(row, col, spawnDirection, 1, pieceOwner);
                cell.addNextPiece(piece);

                setTimeout(() => {
                    //actualizar el valor donde la pieza cae dentro de n segundos (lo q tarda en caer)
                    this.UpdateAndCheckCell(row, col);
                    
                    this.ExplodeCells();

                }, 300);
            }

            static SpawnPiece(row, col, pieceOwner, spawnDirection){

                const cell = this.getCell(row,col);
                const piece = UI.SpawnPiece(row, col, spawnDirection, 1, pieceOwner);
                cell.addNextPiece(piece);
            }

            static UpdateAndCheckCell(row, col){       
                const cell = this.getCell(row,col);
                cell.updateCell();

                if(cell.value >= 4){
                    this.#cellsAboutToExplode.push({
                        row: row,
                        col: col,
                        cell: cell
                    });
                }
            }
            
            static MinusFour(row, col){
                
                const cell = this.getCell(row,col);
                cell.minusFour();
            }
            
            static ExplodeCells(){
                //esta fase mira si hay fichas con valor >=4, si es asi las explotamos y spawneeamos más, hasta q no queden de 4o+

                if(this.#cellsAboutToExplode.length > 0){
                    setTimeout(() => {
                        //Comenzar explosiones 0.1 segs despues

                        //Spawnear fichas
                        this.#cellsAboutToExplode.forEach(cellData => {
                            this.ExplodeCell(cellData.row, cellData.col, cellData.cell);
                        });
                        this.#cellsAboutToExplode=[];

                        setTimeout(() => {
                            //hacer updates para actualizar ui y valores
                            //haremos el update de todas las casillas donde estas han caido
                            this.#positionsToUpdate.forEach(position => {
                                const [r, c] = position.split(',').map(Number);
                                this.UpdateAndCheckCell(r,c);
                            });
                            this.resetPositionsToUpdate(); //limpiar despues

                            this.ExplodeCells();
                        },300);

                    },200);
                }
                else{
                    if(RoomData.isHost){
                        this.newTurnHost(true);
                    }
                    else{
                        GameManager.NewTurnClientExec();
                    }
                }
            }
            static ExplodeCell(row, col, cell){
                this.MinusFour(row, col);
                //Up
                if(row-1 >= 0){
                    this.SpawnPiece(row-1, col, GameManager.currentPlayer, UI.SPAWN_DIRECTIONS.UP);
                    this.#positionsToUpdate.add(`${row-1},${col}`);
                }
                //Down
                if(row+1 < this.#boardSize){
                    this.SpawnPiece(row+1, col, GameManager.currentPlayer, UI.SPAWN_DIRECTIONS.DOWN);
                   
                    this.#positionsToUpdate.add(`${row+1},${col}`);
                }
                //Left
                if(col-1 >= 0){
                    this.SpawnPiece(row, col-1, GameManager.currentPlayer, UI.SPAWN_DIRECTIONS.LEFT);
                    this.#positionsToUpdate.add(`${row},${col-1}`);
                }
                //Right
                if(col+1 < this.#boardSize){
                    this.SpawnPiece(row, col+1, GameManager.currentPlayer, UI.SPAWN_DIRECTIONS.RIGHT);
                    this.#positionsToUpdate.add(`${row},${col+1}`);
                }
            }

            static onStartGame(initialPlayer, boardSize, randomSeed, density){
                
                this.numberOfPlayers = RoomData.players.length;

                if(RoomData.isHost){
                    
                    this.#canActThisTurn = true;
                    this.resetDeathPlayers();
                    this.pointsPerPlayer = [];
                    let i = 0;
                    while(i< this.numberOfPlayers){
                        this. pointsPerPlayer.push(-1);
                        i++;
                    }
                }else{
                    this.clearNewTurnClient();
                    this.density = density;
                }
                this.#initialTurn = true; //reseteamos por si se cancelo partida y se volvió
                this.#cellsAboutToExplode = [];
                this.resetPositionsToUpdate();
                

                UI.setCurrentWindow(UI.WINDOWS.GAME_MENU);
                
                this.randomSeed = randomSeed;
                this.boardSize = boardSize;

                this.currentPlayer = initialPlayer;
            }
        }
        class UI{
            static WINDOWS = {
                MAIN_MENU: 1,
                ROOM_MENU: 2,
                GAME_MENU: 3,
            };
            static SPAWN_DIRECTIONS = {
                NONE: '',
                LEFT: 'anim-left',
                RIGHT: 'anim-right',
                UP: 'anim-up',
                DOWN: 'anim-down',
            };
            static _currentWindow = UI.WINDOWS.MAIN_MENU;
            static setCurrentWindow(newWindow) {
                UI._currentWindow = newWindow;

                //Activar la correspondiente
                const mainDisplay = newWindow === UI.WINDOWS.MAIN_MENU? 'block': 'none';
                document.getElementById('main-menu').style.display = mainDisplay;

                const roomDisplay = newWindow === UI.WINDOWS.ROOM_MENU? 'block': 'none';
                document.getElementById('room-menu').style.display = roomDisplay;

                const gameDisplay = newWindow === UI.WINDOWS.GAME_MENU? 'block': 'none';
                document.getElementById('game-menu').style.display = gameDisplay;

                const hostOptionsDisplay = (newWindow === UI.WINDOWS.ROOM_MENU && RoomData.isHost)? 'block': 'none';
                document.getElementById('startBtn').style.display = hostOptionsDisplay;
                document.getElementById('board-size-selector').style.display = hostOptionsDisplay;
                document.getElementById('wall-density-selector').style.display = hostOptionsDisplay;
                
                
            }

            static showError(msg) {
                switch(this._currentWindow){
                    case UI.WINDOWS.MAIN_MENU:
                        document.getElementById('error-message-main').textContent = msg;
                        break;
                    case UI.WINDOWS.ROOM_MENU:
                        document.getElementById('error-message-room').textContent = msg;
                        break;
                }
                
            }

            static setPlayerList(playerList) {
                const listElement = document.getElementById('players-list');
                listElement.innerHTML = '';
                
                let i = 0;
                playerList.forEach(player => {
                    const li = document.createElement('li');
                    li.className = 'p'+i;
                    
                    const icon = player.isHost ? '👑 ' : '🎮 ';
                    const name = player.isHost ? 
                        `<span class="player-name">${player.name}</span>` : 
                        `<span class="player-name">${player.name}</span>`;
                    
                    // Marcar mi nombre si soy yo
                    const isMe = player.id === RoomData.peer?.id;
                    const mark = isMe ? ' (tú)' : '';
                    
                    li.innerHTML = `${icon}${name}${mark}`;
                    listElement.appendChild(li);

                    i++;
                });
                
                // Si no hay jugadores, mostrar mensaje
                if (playerList.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = 'No hay jugadores en la sala';
                    li.style.fontStyle = 'italic';
                    li.style.color = '#999';
                    listElement.appendChild(li);
                }
            }
        
            static setRoomCode(roomCode){
                document.getElementById('displayRoomCode').textContent = roomCode;
            }
            static setBoard(size, cellsModel) {
                const cellSizePixels = 600 / size;

                const container = document.getElementById('board-container');
                container.innerHTML = '';

                const table = document.createElement('table');
                table.className = 'game-board';

                for (let i = 0; i < size; i++) {
                    const row = document.createElement('tr');

                    for (let j = 0; j < size; j++) {
                        const cell = document.createElement('td');
                        cell.style.width = cellSizePixels + 'px';
                        cell.style.height = cellSizePixels + 'px';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        cell.className = 'game-board-cell';

                        // Añadir clase 'wall' si la celda del modelo es un muro
                        if (cellsModel[i][j].isWall) {
                            cell.classList.add('wall');
                        }

                        cell.onclick = this.onCellClick;
                        row.appendChild(cell);
                    }
                    table.appendChild(row);
                }
                container.appendChild(table);
            }
            
            // static setBoard(size) {
            //     const cellSizePixels = 600/size;
               
            //     const container = document.getElementById('board-container');
            //     container.innerHTML = ''; 
                
            //     const table = document.createElement('table');
            //     table.className = 'game-board';
                
            //     for (let i = 0; i < size; i++) {
            //         const row = document.createElement('tr');
                    
            //         for (let j = 0; j < size; j++) {
            //             const cell = document.createElement('td');
            //             cell.style.width = cellSizePixels+'px';
            //             cell.style.height = cellSizePixels+'px';
            //             cell.dataset.row = i;
            //             cell.dataset.col = j;
            //             cell.className = 'game-board-cell';

            //             cell.onclick = this.onCellClick;
            //             row.appendChild(cell);
            //         }
            //         table.appendChild(row);
            //     }
            //     container.appendChild(table);
            // }

            static onCellClick(){
                //this es el objeto cell clickado
                if(parseInt(this.dataset.clickable)=== 0) return;

                const row = parseInt(this.dataset.row);
                const col = parseInt(this.dataset.col);

                GameManager.onCellClick_DoOrReq(row, col);
            }

            static SpawnPiece(row, col, spawnDirection, value, owner){

                const piece = document.createElement('div');
                piece.className = 'game-piece '+ spawnDirection; 
                
                const cell = document.querySelector(`.game-board-cell[data-row="${row}"][data-col="${col}"]`);
                cell.appendChild(piece);

                piece.classList.add('v'+value);
                piece.classList.add('p'+owner);

                return piece;
            }

            static SetCurrentPlayer(name, id, lastId, isMyTurn){

                const currentPlayer = document.getElementById('current-player');
                
                let nameToShow = name;
                if(isMyTurn) nameToShow+= ' (tú)'; 
                currentPlayer.textContent = nameToShow;

                const board = document.getElementById('game-menu');
                board.classList.remove('p'+lastId);
                board.classList.add('p'+id);
            }

            static SetMyTurn(isMyTurn, isMyFirstTurn) {
                // Seleccionar todas las celdas
                const cells = document.querySelectorAll('.game-board-cell');
                
                if (isMyFirstTurn) {
                    // Activar click en las casillas vacias
                    cells.forEach(cell => {
                        const row = parseInt(cell.dataset.row);
                        const col = parseInt(cell.dataset.col);

                        if(GameManager.getCell(row,col).hasOwner || GameManager.getCell(row,col).isWall){
                            cell.dataset.clickable = 0;
                            cell.classList.remove('clickable');
                        }else{
                            cell.dataset.clickable = 1;
                            cell.classList.add('clickable');
                        }
                    });
                } else if(isMyTurn){
                    // Activar click en las mias
                    cells.forEach(cell => {
                        const row = parseInt(cell.dataset.row);
                        const col = parseInt(cell.dataset.col);

                        const imTheOwner = GameManager.getCell(row,col).imTheOwner;

                        if(imTheOwner){
                            cell.dataset.clickable = 1;
                            cell.classList.add('clickable');
                        }else{
                            cell.dataset.clickable = 0;
                            cell.classList.remove('clickable');
                        }
                    });
                }
                else {
                    // Inabilitar click en todas
                    cells.forEach(cell => {
                        cell.dataset.clickable = 0;
                        cell.classList.remove('clickable');
                    });
                }
            }
        }
        
        function createRoom() {
            //El host crea una sala

            UI.showError('');
            
            RoomData.myName = document.getElementById('player-name').value.trim();

            if(!RoomData.myName){
                UI.showError('Elige un nombre');
                return;
            }
            RoomData.roomId = document.getElementById('roomCode').value.trim();
    
            // Si no pusieron código, generar uno de 4 dígitos
            if (!RoomData.roomId) {
                RoomData.roomId = Math.floor(1000 + Math.random() * 9000).toString();
            } else if (!/^\d{4}$/.test(RoomData.roomId)) {
                UI.showError('El código debe ser de 4 dígitos');
                return;
            }
            
            // Crear Peer con el código del input
            RoomData.peer = new Peer(RoomData.roomId);
            
            RoomData.peer.on('open', (id) => {
                RoomData.roomId = id;
                RoomData.isHost = true;
                
                // Agregarme a la lista de jugadores como host
                RoomData.players = [{
                    id: RoomData.peer.id,
                    name: RoomData.myName,
                    isHost: true
                }];
                
                UI.setCurrentWindow(UI.WINDOWS.ROOM_MENU);
                UI.setPlayerList(RoomData.players);
                UI.setRoomCode(id);
                
                // Escuchar conexiones de jugadores
                RoomData.peer.on('connection', (connection) => {
                    RoomData.AddClientConn(connection);
                    
                    // Enviar lista actual de jugadores a todos los clientes conectados
                    setTimeout(() => {
                        RoomData.SendMessageToClients({
                            type: 'players_list',
                            players: RoomData.players
                        });
                    }, 500);
                });
            });
            
            RoomData.peer.on('error', (error) => {
                UI.setCurrentWindow(UI.WINDOWS.MAIN_MENU);
                UI.showError('Error al crear sala: ' + error.type);
            });
        }
        
        function joinRoom() {
            if(RoomData.hostConnection) return;

            RoomData.roomId = document.getElementById('roomCode').value.trim();
            RoomData.myName = document.getElementById('player-name').value.trim();

            if(!RoomData.myName){
                UI.showError('Elige un nombre');
                return;
            }

            if (!RoomData.roomId) {
                UI.showError('Ingresa un código de sala');
                return;
            }
            
            UI.showError('');
            
            RoomData.peer = new Peer();
            
            RoomData.peer.on('open', () => {
                const hostConn = RoomData.peer.connect(RoomData.roomId);
                RoomData.SetHostConn(hostConn);

                // Timeout por si no se puede conectar
                const connectionTimeout = setTimeout(() => {
                    UI.setCurrentWindow(UI.WINDOWS.MAIN_MENU);
                    UI.showError('No se pudo conectar a la sala.');
                    RoomData.peer.destroy();
                }, 5000);
                
                RoomData.hostConnection.on('open', () => {
                    clearTimeout(connectionTimeout);
                    RoomData.isHost = false;
                    
                    UI.setCurrentWindow(UI.WINDOWS.ROOM_MENU);
                    UI.setRoomCode(RoomData.roomId);
                    
                    // Enviar mi nombre al host
                    RoomData.SendMessageToHost({ 
                        type: 'new_player',
                        name: RoomData.myName,
                        id: RoomData.peer.id
                    });
                });
                
                RoomData.hostConnection.on('close', () => {
                    cancelRoom();
                });
                
                RoomData.hostConnection.on('error', (error) => {
                    UI.showError('Error de conexión: ' + error);
                });
            });
            
            RoomData.peer.on('error', (error) => {
                UI.setCurrentWindow(UI.WINDOWS.MAIN_MENU);
                UI.showError('Error al unirse: ' + error.type);
            });
        }
        
        function startGame(){
            //El host da a empezar partida

            if(RoomData.players.length === 1){
                UI.showError('Se necesitan 2 jugadores mínimo');
                return;
            }

            //avisar a los jugadores de q empiecen partida
            const initialPlayer = GameManager.randomPlayer;
            const randomSeed = Math.random() * 100000;
            //empezarla nosotros
            if(!selectedBoardSize){
                const val = document.getElementById('board-size-selector').value;
                selectedBoardSize = parseInt(val);
            }
            GameManager.onStartGame(initialPlayer, selectedBoardSize, randomSeed, GameManager.density);

            RoomData.SendMessageToClients({
                type: 'start_game',
                initialPlayer: initialPlayer,
                boardSize:selectedBoardSize,
                randomSeed: randomSeed,
                density: GameManager.density
            });
            
        }

        let selectedBoardSize;
        function changeBoardSize(value){
            const boardSize = parseInt(value);//número de casillas de alto y ancho
            GameManager.boardSize = boardSize;
        }
        function changeWallDensity(value){
            const density = parseInt(value);
            GameManager.density = density/10;
        }

        function cancelRoom() {
            if (RoomData.peer) {
                RoomData.peer.destroy();
            }
            resetPlayersList();
            RoomData.hostConnection = null;
            UI.setCurrentWindow(UI.WINDOWS.MAIN_MENU);
        }
        
        function resetPlayersList() {
            RoomData.players = [];
            UI.setPlayerList(RoomData.players);
        }
        // Limpiar todo si se cierra la pestaña
        window.addEventListener('beforeunload', () => {
            if (RoomData.peer) {
                RoomData.peer.destroy();
            }
        });
    </script>
